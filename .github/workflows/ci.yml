name: CI

on:
  pull_request:
    branches: [main]
  workflow_call:
    inputs:
      skip_docker:
        description: Skip Docker build and health verification
        required: false
        type: boolean
        default: false

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "22"

jobs:
  python:
    name: Python — lint, format, tests, types
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ruff lint
        run: ruff check app tests

      - name: Black check
        run: black --check app tests

      - name: Pytest with coverage
        env:
          APP_ENV: test
          DATABASE_URL: sqlite+aiosqlite:///:memory:
          JWT_SECRET: ci-test-secret
        run: |
          pytest \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=80 \
            -v

      - name: Mypy
        run: mypy app --config-file pyproject.toml

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.xml
          retention-days: 7

  frontend:
    name: Frontend — lint, types, tests, build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then npm ci; else npm install; fi

      - name: ESLint
        run: npm run lint

      - name: TypeScript check
        run: npm run typecheck

      - name: Vitest
        run: npm run test -- --coverage

      - name: Production build
        env:
          VITE_API_BASE_URL: /api/v1
        run: npm run build

  docker:
    name: Docker — build and health check
    if: ${{ !inputs.skip_docker }}
    runs-on: ubuntu-latest
    needs: [python, frontend]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/backend.Dockerfile
          push: false
          load: true
          tags: gradeai-backend:ci
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/frontend.Dockerfile
          push: false
          load: true
          tags: gradeai-frontend:ci
          build-args: VITE_API_BASE_URL=/api/v1
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      - name: Verify containers start healthy
        run: |
          docker compose -f docker-compose.ci.yml up -d --wait --timeout 180
          curl -fsS http://localhost:8000/api/v1/health | tee /tmp/health.json
          grep -q '"status"' /tmp/health.json
          curl -fsS -o /dev/null -w "%{http_code}" http://localhost:3000/ | grep -q 200
          docker compose -f docker-compose.ci.yml ps
          docker compose -f docker-compose.ci.yml logs --no-color backend | tail -50

      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.ci.yml down -v --remove-orphans

  ci-success:
    name: CI gate
    runs-on: ubuntu-latest
    needs: [python, frontend, docker]
    if: always()
    steps:
      - name: Require all jobs
        env:
          SKIP_DOCKER: ${{ inputs.skip_docker }}
          PYTHON_RESULT: ${{ needs.python.result }}
          FRONTEND_RESULT: ${{ needs.frontend.result }}
          DOCKER_RESULT: ${{ needs.docker.result }}
        run: |
          FAILED=0
          [[ "$PYTHON_RESULT" == "success" ]] || FAILED=1
          [[ "$FRONTEND_RESULT" == "success" ]] || FAILED=1
          if [[ "$SKIP_DOCKER" != "true" && "$DOCKER_RESULT" != "success" ]]; then
            FAILED=1
          fi
          if [[ "$FAILED" -ne 0 ]]; then
            echo "CI failed: python=$PYTHON_RESULT frontend=$FRONTEND_RESULT docker=$DOCKER_RESULT skip_docker=$SKIP_DOCKER"
            exit 1
          fi
          echo "All CI jobs passed."
