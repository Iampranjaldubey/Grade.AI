name: Deploy Staging

on:
  push:
    branches: [main]

concurrency:
  group: deploy-staging
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
  IMAGE_TAG: staging-${{ github.sha }}

jobs:
  ci:
    name: Run full CI
    uses: ./.github/workflows/ci.yml

  build-and-push:
    name: Build and push to ECR
    runs-on: ubuntu-latest
    needs: ci
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_STAGING }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend
        id: meta-backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/backend.Dockerfile
          push: true
          tags: |
            ${{ secrets.ECR_REGISTRY }}/${{ secrets.ECR_REPOSITORY_BACKEND }}:${{ env.IMAGE_TAG }}
            ${{ secrets.ECR_REGISTRY }}/${{ secrets.ECR_REPOSITORY_BACKEND }}:staging-latest
          cache-from: type=gha,scope=backend-staging
          cache-to: type=gha,mode=max,scope=backend-staging

      - name: Build and push frontend
        id: meta-frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/frontend.Dockerfile
          push: true
          tags: |
            ${{ secrets.ECR_REGISTRY }}/${{ secrets.ECR_REPOSITORY_FRONTEND }}:${{ env.IMAGE_TAG }}
            ${{ secrets.ECR_REGISTRY }}/${{ secrets.ECR_REPOSITORY_FRONTEND }}:staging-latest
          build-args: VITE_API_BASE_URL=${{ vars.STAGING_API_BASE_URL || '/api/v1' }}
          cache-from: type=gha,scope=frontend-staging
          cache-to: type=gha,mode=max,scope=frontend-staging

  migrate:
    name: Run Alembic migrations (staging)
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_STAGING }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Run migration task on ECS
        env:
          CLUSTER: ${{ secrets.ECS_CLUSTER_STAGING }}
          TASK_DEFINITION: ${{ secrets.ECS_MIGRATE_TASK_FAMILY_STAGING }}
          SUBNETS: ${{ secrets.ECS_SUBNETS_STAGING }}
          SECURITY_GROUPS: ${{ secrets.ECS_SECURITY_GROUPS_STAGING }}
        run: |
          TASK_ARN=$(aws ecs run-task \
            --cluster "$CLUSTER" \
            --task-definition "$TASK_DEFINITION" \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[$SUBNETS],securityGroups=[$SECURITY_GROUPS],assignPublicIp=DISABLED}" \
            --overrides '{"containerOverrides":[{"name":"migrate","command":["alembic","upgrade","head"]}]}' \
            --query 'tasks[0].taskArn' --output text)
          echo "Migration task: $TASK_ARN"
          aws ecs wait tasks-stopped --cluster "$CLUSTER" --tasks "$TASK_ARN"
          EXIT_CODE=$(aws ecs describe-tasks --cluster "$CLUSTER" --tasks "$TASK_ARN" \
            --query 'tasks[0].containers[0].exitCode' --output text)
          if [[ "$EXIT_CODE" != "0" ]]; then
            echo "Migration failed with exit code $EXIT_CODE"
            exit 1
          fi

  deploy:
    name: Deploy to staging ECS
    runs-on: ubuntu-latest
    needs: [build-and-push, migrate]
    environment:
      name: staging
      url: ${{ vars.STAGING_URL }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_STAGING }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Render backend task definition
        id: render-backend
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: deploy/ecs/task-definition-backend-staging.json
          container-name: backend
          image: ${{ secrets.ECR_REGISTRY }}/${{ secrets.ECR_REPOSITORY_BACKEND }}:${{ env.IMAGE_TAG }}

      - name: Deploy backend to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-backend.outputs.task-definition }}
          service: ${{ secrets.ECS_SERVICE_BACKEND_STAGING }}
          cluster: ${{ secrets.ECS_CLUSTER_STAGING }}
          wait-for-service-stability: true

      - name: Render frontend task definition
        id: render-frontend
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: deploy/ecs/task-definition-frontend-staging.json
          container-name: frontend
          image: ${{ secrets.ECR_REGISTRY }}/${{ secrets.ECR_REPOSITORY_FRONTEND }}:${{ env.IMAGE_TAG }}

      - name: Deploy frontend to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-frontend.outputs.task-definition }}
          service: ${{ secrets.ECS_SERVICE_FRONTEND_STAGING }}
          cluster: ${{ secrets.ECS_CLUSTER_STAGING }}
          wait-for-service-stability: true

  smoke-test:
    name: Smoke test staging
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Health check
        env:
          STAGING_BASE_URL: ${{ vars.STAGING_URL }}
        run: |
          for i in $(seq 1 20); do
            STATUS=$(curl -sS -o /tmp/health.json -w "%{http_code}" "${STAGING_BASE_URL}/api/v1/health" || true)
            if [[ "$STATUS" == "200" ]]; then
              cat /tmp/health.json
              exit 0
            fi
            sleep 10
          done
          echo "Staging health check failed after retries"
          exit 1

  notify:
    name: Slack notification
    runs-on: ubuntu-latest
    needs: [ci, build-and-push, migrate, deploy, smoke-test]
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Notify Slack
        uses: ./.github/actions/slack-notify
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
          status: ${{ needs.smoke-test.result == 'success' && 'success' || 'failure' }}
          environment: staging
          message: |
            Staging deploy `${{ github.sha }}`
            CI: ${{ needs.ci.result }}
            Build: ${{ needs.build-and-push.result }}
            Migrate: ${{ needs.migrate.result }}
            Deploy: ${{ needs.deploy.result }}
            Smoke: ${{ needs.smoke-test.result }}
